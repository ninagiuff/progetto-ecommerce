<nav class="bg-white shadow px-6 py-4 flex items-center justify-between">
  <a routerLink="/" class="text-xl font-bold text-gray-800">E-COMMERCE</a>
  <div class="flex items-center gap-6">
    <a routerLink="/" class="text-gray-600 hover:text-gray-900">Prodotti</a>
    @if (auth.isAdmin()) {
      <a routerLink="/admin" class="text-gray-600 hover:text-gray-900">Admin</a>
      <button (click)="logout()" class="text-gray-600 hover:text-gray-900">Logout</button>
    } @else {
      <a routerLink="/login" class="text-gray-600 hover:text-gray-900">Login</a>
    }
    <a routerLink="/carrello" class="relative text-gray-800">
      🛒
      @if (cart.count() > 0) {
        <span class="absolute -top-2 -right-2 bg-red-500 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center">
          {{ cart.count() }}
        </span>
      }
    </a>
  </div>
</nav>

<main class="container mx-auto px-4 py-8">
  <router-outlet />
</main>

<footer class="text-center py-6 text-gray-400 text-sm border-t mt-8">
  © 2025 E-COMMERCE
</footer>
