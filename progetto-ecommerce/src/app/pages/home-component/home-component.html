<section class="home">
<header class="shop-header">
<h1 class="hero-title">Collezione<br><em>Primavera</em></h1>
<p class="hero-sub">Artigianato italiano • Materiali selezionati • Edizione limitata</p>
</header>

@if (productSvc.loading()) {
<div class="loading-grid">
  @for (n of [1,2,3,4,5,6]; track n) {
    <div class="skeleton-card"></div>
  }
</div>
} @else {
<div class="products-grid">
  @for (product of productSvc.products(); track product.id) {
    <app-product-card-component
      [product]="product"
      (addToCart)="onAddToCart($event)"
    />
  }
</div>
}
</section>
