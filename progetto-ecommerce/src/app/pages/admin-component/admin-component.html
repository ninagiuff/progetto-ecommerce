<div class="flex justify-between items-center mb-6">
  <h2 class="text-2xl font-bold">Gestione Prodotti</h2>
  <a routerLink="/admin/prodotto/nuovo" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 text-sm">
    + Nuovo prodotto
  </a>
</div>

<div class="overflow-x-auto bg-white rounded-lg shadow">
  <table class="w-full text-sm">
    <thead class="bg-gray-50 border-b">
      <tr>
        <th class="text-left px-4 py-3 text-gray-600">ID</th>
        <th class="text-left px-4 py-3 text-gray-600">Nome</th>
        <th class="text-left px-4 py-3 text-gray-600">Categoria</th>
        <th class="text-left px-4 py-3 text-gray-600">Prezzo</th>
        <th class="text-left px-4 py-3 text-gray-600">Qtà</th>
        <th class="text-left px-4 py-3 text-gray-600">Stato</th>
        <th class="text-left px-4 py-3 text-gray-600">Azioni</th>
      </tr>
    </thead>
    <tbody>
      @for (p of productSvc.products(); track p.id) {
        <tr class="border-b hover:bg-gray-50">
          <td class="px-4 py-3 text-gray-400">#{{ p.id }}</td>
          <td class="px-4 py-3 font-medium">{{ p.name }}</td>
          <td class="px-4 py-3 text-gray-500">{{ p.category }}</td>
          <td class="px-4 py-3">€ {{ p.price }}</td>
          <td class="px-4 py-3">{{ p.quantity }}</td>
          <td class="px-4 py-3">
            @if (p.quantity === 0) {
              <span class="bg-red-100 text-red-600 text-xs px-2 py-1 rounded">Esaurito</span>
            } @else {
              <span class="bg-green-100 text-green-600 text-xs px-2 py-1 rounded">Disponibile</span>
            }
          </td>
          <td class="px-4 py-3">
            <div class="flex gap-3">
              <a [routerLink]="['/admin/prodotto', p.id]" class="text-blue-600 hover:underline">Modifica</a>
              <button (click)="deleteProduct(p)" class="text-red-500 hover:underline">Elimina</button>
            </div>
          </td>
        </tr>
      }
    </tbody>
  </table>
</div>

<router-outlet />
